services:
  mongodb:
    image: mongo:latest
    container_name: assignment4_mongo
    ports:
      - "27017:27017"
    volumes:
      - ./data/mongo:/data/db
    restart: unless-stopped

  redis:
    image: redis:latest
    container_name: assignment4_redis
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    restart: unless-stopped
